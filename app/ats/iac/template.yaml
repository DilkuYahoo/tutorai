              Authorizer: CognitoJwt

  CreateInterviewFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-create-interview
      CodeUri: ../lambda/interviews/
      Handler: create_interview.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
