    Properties:
      FunctionName: ats-invite-user
      CodeUri: ../lambda/users/
      Handler: invite_user.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: POST
            Path: /users
            Auth:
              Authorizer: CognitoJwt

  UpdateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-update-user
      CodeUri: ../lambda/users/
      Handler: update_user.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
