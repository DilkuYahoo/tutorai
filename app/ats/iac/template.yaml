            Auth:
              Authorizer: CognitoJwt

  GetAuditTrailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-get-audit-trail
      CodeUri: ../lambda/audit/
      Handler: get_audit_trail.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: GET
            Path: /audit/{entityId}
            Auth:
              Authorizer: CognitoJwt

  # ─────────────────────────────────────────────────────────────────────────
  # Lambda Functions — Resumes & Notifications
  # ─────────────────────────────────────────────────────────────────────────
