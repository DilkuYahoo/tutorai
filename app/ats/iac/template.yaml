AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ATS — Applicant Tracking System (SAM template)

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  SesFromAddress:
    Type: String
    Default: noreply@advicelab.com.au
  SendEmailApiUrl:
    Type: String
    Default: ""
  CorsOrigin:
    Type: String
    Default: "*"

# ─────────────────────────────────────────────────────────────────────────────
# Globals
# ─────────────────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.13
    MemorySize: 256
    Timeout: 15
    Architectures: [arm64]
    Layers:
      - !Ref SharedLayer
    Environment:
      Variables:
        TABLE_NAME: !Ref AtsTable
        RESUME_BUCKET: advicelab
        RESUME_PREFIX: ats/resumes/prod
        SES_FROM_ADDRESS: !Ref SesFromAddress
        SEND_EMAIL_API_URL: !Ref SendEmailApiUrl
        NOTIFICATION_LAMBDA_ARN: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:ats-send-email"
        CORS_ORIGIN: !Ref CorsOrigin
        USER_POOL_ID: !Ref UserPool

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── Shared Lambda Layer ───────────────────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: ats-shared
      Description: Shared Python utilities (db, auth, response, ids, validation)
      ContentUri: ../lambda/
      CompatibleRuntimes: [python3.13]
      CompatibleArchitectures: [arm64, x86_64]
    Metadata:
      BuildMethod: python3.13

  # ── DynamoDB Table ────────────────────────────────────────────────────────
  AtsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: al_ats_prod
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── Cognito User Pool ─────────────────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: ats-users
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: role
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: true
      UserPoolAddOns:
        AdvancedSecurityMode: AUDIT

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: ats-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # ── API Gateway ───────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsOrigin
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        MaxAge: 600
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient

  # ── IAM Role shared by all Lambda functions ───────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ats-lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AtsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:TransactWriteItems
                  - dynamodb:BatchGetItem
                Resource:
                  - !GetAtt AtsTable.Arn
                  - !Sub "${AtsTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - arn:aws:s3:::advicelab/ats/resumes/prod/*
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:ats-send-email"
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:AdminEnableUser
                  - cognito-idp:AdminDisableUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminGetUser
                Resource: !GetAtt UserPool.Arn

  # ─────────────────────────────────────────────────────────────────────────
  # Lambda Functions — Jobs
  # ─────────────────────────────────────────────────────────────────────────
  ListJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-list-jobs
      CodeUri: ../lambda/jobs/
      Handler: list_jobs.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: GET
            Path: /jobs

  ListJobsPublicFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-list-jobs-public
      CodeUri: ../lambda/jobs/
      Handler: list_jobs_public.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: GET
            Path: /jobs/public
            Auth:
              Authorizer: NONE

  GetJobPublicFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-get-job-public
      CodeUri: ../lambda/jobs/
      Handler: get_job_public.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: GET
            Path: /jobs/public/{jobId}
            Auth:
              Authorizer: NONE

  GetJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-get-job
      CodeUri: ../lambda/jobs/
      Handler: get_job.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: GET
            Path: /jobs/{jobId}
            Auth:
              Authorizer: CognitoJwt

  CreateJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-create-job
      CodeUri: ../lambda/jobs/
      Handler: create_job.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: POST
            Path: /jobs
            Auth:
              Authorizer: CognitoJwt

  UpdateJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-update-job
      CodeUri: ../lambda/jobs/
      Handler: update_job.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: PUT
            Path: /jobs/{jobId}
            Auth:
              Authorizer: CognitoJwt

  ArchiveJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-archive-job
      CodeUri: ../lambda/jobs/
      Handler: archive_job.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: DELETE
            Path: /jobs/{jobId}
            Auth:
              Authorizer: CognitoJwt

  # ─────────────────────────────────────────────────────────────────────────
  # Lambda Functions — Candidates
  # ─────────────────────────────────────────────────────────────────────────
  ListCandidatesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-list-candidates
      CodeUri: ../lambda/candidates/
      Handler: list_candidates.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: GET
            Path: /candidates
            Auth:
              Authorizer: CognitoJwt

  GetCandidateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-get-candidate
      CodeUri: ../lambda/candidates/
      Handler: get_candidate.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: GET
            Path: /candidates/{candidateId}
            Auth:
              Authorizer: CognitoJwt

  CreateCandidateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-create-candidate
      CodeUri: ../lambda/candidates/
      Handler: create_candidate.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: POST
            Path: /candidates
            Auth:
              Authorizer: NONE

  UpdateCandidateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-update-candidate
      CodeUri: ../lambda/candidates/
      Handler: update_candidate.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
