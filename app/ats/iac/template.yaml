            Path: /applications
            Auth:
              Authorizer: NONE

  MoveStageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-move-stage
      CodeUri: ../lambda/applications/
      Handler: move_stage.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
