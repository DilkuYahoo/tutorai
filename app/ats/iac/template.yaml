            Auth:
              Authorizer: CognitoJwt

  CreateApplicationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-create-application
      CodeUri: ../lambda/applications/
      Handler: create_application.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
