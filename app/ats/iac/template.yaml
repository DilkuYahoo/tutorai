    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ats-get-upload-url
      CodeUri: ../lambda/resumes/
      Handler: get_upload_url.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: POST
            Path: /resumes/upload-url
            Auth:
              Authorizer: NONE


# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: HTTP API endpoint
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient

  TableName:
    Description: DynamoDB table name
    Value: !Ref AtsTable

  ResumePrefix:
    Description: S3 path for resume uploads (in shared advicelab bucket)
    Value: s3://advicelab/ats/resumes/prod/

  WebPrefix:
    Description: S3 path for frontend web artifacts (in shared advicelab bucket)
    Value: s3://advicelab/ats/web/prod/
