version = 0.1

[default.global.parameters]
stack_name = "playgenie-prod"
region     = "ap-southeast-2"

[default.build.parameters]
cached   = true
parallel = true

[default.deploy.parameters]
region              = "ap-southeast-2"
confirm_changeset   = true
resolve_s3          = true
capabilities        = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
s3_prefix           = "playgenie"
# Fill these in before first deploy:
# parameter_overrides = "StripeSecretArn=\"arn:aws:secretsmanager:ap-southeast-2:ACCOUNT:secret:playgenie/stripe\" StripeWebhookSecret=\"whsec_...\" SesFromAddress=\"noreply@playgenie.com.au\" CorsOrigin=\"https://playgenie.com.au\""
