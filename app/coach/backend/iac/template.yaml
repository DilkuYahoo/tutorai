AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Playgenie — Cricket Coach Scheduling Platform

Parameters:
  StripeSecretArn:
    Type: String
    Description: Secrets Manager ARN containing the Stripe secret key
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Description: Stripe webhook signing secret
  SesFromAddress:
    Type: String
    Description: SES verified sender address (e.g. noreply@playgenie.com.au)
  SendEmailFunctionName:
    Type: String
    Default: pg-send-email
    Description: Name of the async SES dispatcher Lambda
  CorsOrigin:
    Type: String
    Default: "*"
    Description: Allowed CORS origin (e.g. https://playgenie.com.au)
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging, dev]

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 256
    Timeout: 15
    Architectures:
      - arm64
    Layers:
      - !Ref SharedLayer
    Environment:
      Variables:
        TABLE_NAME: !Ref PlaygenieTable
        S3_BUCKET: cognifylabs.ai
        S3_PREFIX: coachgenie
        USER_POOL_ID: !Ref UserPool
        SES_FROM_ADDRESS: !Ref SesFromAddress
        CORS_ORIGIN: !Ref CorsOrigin
        STRIPE_SECRET_ARN: !Ref StripeSecretArn
        STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
        NOTIFICATION_FUNCTION_NAME: !Ref SendEmailFunctionName
        REPORTING_BUCKET: cognifylabs.ai

# ─── RESOURCES ───────────────────────────────────────────────────────────────

Resources:

  # ── Shared Lambda Layer ───────────────────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: pg-shared
      Description: Playgenie shared Python utilities
      ContentUri: ../lambda/
      CompatibleRuntimes:
        - python3.13
      CompatibleArchitectures:
        - arm64
    Metadata:
      BuildMethod: python3.13

  # ── DynamoDB ─────────────────────────────────────────────────────────────
  PlaygenieTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: pg_playgenie_prod
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        - AttributeName: GSI3PK
          AttributeType: S
        - AttributeName: GSI3SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI3
          KeySchema:
            - AttributeName: GSI3PK
              KeyType: HASH
            - AttributeName: GSI3SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── Cognito ───────────────────────────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: pg-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: role
          AttributeDataType: String
          Mutable: true
          Required: false
      UserPoolAddOns:
        AdvancedSecurityMode: AUDIT

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: pg-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # ── API Gateway ───────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 20
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsOrigin
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        MaxAge: 600
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient

  # ── IAM Execution Role ────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pg-lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PlaygenieAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:TransactWriteItems
                  - dynamodb:BatchGetItem
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource:
                  - !GetAtt PlaygenieTable.Arn
                  - !Sub "${PlaygenieTable.Arn}/index/*"
                  - !Sub "${PlaygenieTable.Arn}/stream/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:GeneratePresignedUrl
                Resource:
                  - arn:aws:s3:::cognifylabs.ai/coachgenie/*
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${SendEmailFunctionName}"
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:AdminEnableUser
                  - cognito-idp:AdminDisableUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminGetUser
                  - cognito-idp:ListUsers
                Resource: !GetAtt UserPool.Arn
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref StripeSecretArn
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                Resource: "*"
              - Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetDatabase
                  - glue:GetPartitions
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::cognifylabs.ai

  # ── Glue Catalog ─────────────────────────────────────────────────────────
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: playgenie
        Description: Playgenie reporting database

  # ── Athena WorkGroup ──────────────────────────────────────────────────────
  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: playgenie
      WorkGroupConfiguration:
        ResultConfiguration:
          OutputLocation: s3://cognifylabs.ai/coachgenie/athena-results/
        EnforceWorkGroupConfiguration: true

  # ── EventBridge Scheduler Role ────────────────────────────────────────────
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pg-scheduler
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt VideoReviewFlagFunction.Arn
                  - !GetAtt SessionReminderFunction.Arn

