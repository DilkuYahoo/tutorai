          Properties:
            ApiId: !Ref Api
            Method: POST
            Path: /webhooks/stripe
            Auth:
              Authorizer: NONE

  # ── Reports ───────────────────────────────────────────────────────────────
  GetDashboardStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pg-get-dashboard-stats
      CodeUri: ../lambda/reports/
      Handler: get_dashboard_stats.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: GET
            Path: /reports/dashboard

  GetReconciliationReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pg-get-reconciliation-report
      CodeUri: ../lambda/reports/
      Handler: get_reconciliation_report.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: GET
            Path: /reports/reconciliation

  ExportReconciliationCsvFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pg-export-reconciliation-csv
      CodeUri: ../lambda/reports/
      Handler: export_reconciliation_csv.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Method: POST
            Path: /reports/reconciliation/export

  # ── Notifications ─────────────────────────────────────────────────────────
  SendEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref SendEmailFunctionName
      CodeUri: ../lambda/notifications/
      Handler: send_email.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30

  # ── DynamoDB Streams Transformer ──────────────────────────────────────────
  StreamsTransformerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pg-streams-transformer
      CodeUri: ../lambda/streams/
      Handler: transform.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      Events:
        DDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt PlaygenieTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 100
            BisectBatchOnFunctionError: true
            MaximumRetryAttempts: 3

  # ── Scheduled Functions ───────────────────────────────────────────────────
  VideoReviewFlagFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pg-video-review-flag
      CodeUri: ../lambda/scheduled/
      Handler: video_review_flag.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60

  VideoReviewFlagSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: pg-video-review-flag-daily
      ScheduleExpression: "cron(0 16 * * ? *)"  # 2 AM AEST (UTC+10) = 16:00 UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt VideoReviewFlagFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn

  SessionReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pg-session-reminder
      CodeUri: ../lambda/scheduled/
      Handler: session_reminder.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60

  SessionReminderSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: pg-session-reminder-hourly
      ScheduleExpression: "rate(1 hour)"
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt SessionReminderFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn

# ─── OUTPUTS ─────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: Playgenie API Gateway URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: PlaygenieApiUrl

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: PlaygenieUserPoolId

  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: PlaygenieUserPoolClientId

  S3BucketName:
    Description: S3 bucket used for all Playgenie assets (shared cognifylabs.ai bucket)
    Value: cognifylabs.ai
    Export:
      Name: PlaygenieS3Bucket

  DynamoTableName:
    Description: DynamoDB table name
    Value: !Ref PlaygenieTable
    Export:
      Name: PlaygenieTableName
