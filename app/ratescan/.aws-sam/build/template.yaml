AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Ratescan daily Open Banking data pipeline
Parameters:
  DataBucketName:
    Type: String
    Default: ratescan.com.au
  IcebergWarehouse:
    Type: String
    Default: s3://ratescan.com.au/iceberg/
  IcebergDb:
    Type: String
    Default: obdb
  IcebergTable:
    Type: String
    Default: daily_rates
  IcebergCatalog:
    Type: String
    Default: OpenBanking
    Description: PyIceberg catalog name (client-side identifier for the AWS Glue catalog)
  AlertEmail:
    Type: String
    Description: Email address to notify on pipeline failure
    Default: ''
Globals:
  Function:
    MemorySize: 512
    Environment:
      Variables:
        S3_BUCKET:
          Ref: DataBucketName
        S3_PREFIX: products
        CONFIG_S3_KEY: config.json
        REQUEST_TIMEOUT: '30'
Resources:
  PipelineImageRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: ratescan-pipeline
      LifecyclePolicy:
        LifecyclePolicyText: "{\"rules\":[{\"rulePriority\":1,\"description\":\"Keep\
          \ last 5 images\",\n  \"selection\":{\"tagStatus\":\"any\",\"countType\"\
          :\"imageCountMoreThan\",\"countNumber\":5},\n  \"action\":{\"type\":\"expire\"\
          }}]}\n"
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ratescan-pipeline-alerts
  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn:
        Ref: AlertTopic
      Protocol: email
      Endpoint:
        Ref: AlertEmail
  GenerateBankListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ratescan-generate-bank-list
      Handler: generate_bank_list.lambda_handler
      Runtime: python3.13
      CodeUri: GenerateBankListFunction
      Timeout: 30
      MemorySize: 256
      Role:
        Fn::GetAtt:
        - GenerateBankListRole
        - Arn
    Metadata:
      SamResourceId: GenerateBankListFunction
  Stage1FetchProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ratescan-stage1-fetch-products
      PackageType: Image
      ImageUri: stage1fetchproductsfunction:latest
      ImageConfig:
        Command:
        - main.lambda_handler
      Timeout: 300
      Role:
        Fn::GetAtt:
        - Stage1Role
        - Arn
    Metadata:
      DockerContext: /Users/Dilku/app/source-code/tutorai/app/ratescan
      Dockerfile: Dockerfile
      SamResourceId: Stage1FetchProductsFunction
  Stage2FetchDetailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ratescan-stage2-fetch-details
      PackageType: Image
      ImageUri: stage1fetchproductsfunction:latest
      ImageConfig:
        Command:
        - main_prod_details.lambda_handler
      Timeout: 840
      Role:
        Fn::GetAtt:
        - Stage2Role
        - Arn
    Metadata:
      DockerContext: /Users/Dilku/app/source-code/tutorai/app/ratescan
      Dockerfile: Dockerfile
      SamResourceId: Stage2FetchDetailsFunction
  Stage3FlattenCsvFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ratescan-stage3-flatten-csv
      PackageType: Image
      ImageUri: stage1fetchproductsfunction:latest
      ImageConfig:
        Command:
        - flatten_json_to_csv.lambda_handler
      Timeout: 600
      MemorySize: 2048
      Role:
        Fn::GetAtt:
        - Stage3Role
        - Arn
    Metadata:
      DockerContext: /Users/Dilku/app/source-code/tutorai/app/ratescan
      Dockerfile: Dockerfile
      SamResourceId: Stage3FlattenCsvFunction
  Stage4UpsertFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ratescan-stage4-upsert
      PackageType: Image
      ImageUri: stage1fetchproductsfunction:latest
      ImageConfig:
        Command:
        - upsert_dataset.lambda_handler
      Timeout: 600
      MemorySize: 3008
      Role:
        Fn::GetAtt:
        - Stage4Role
        - Arn
      Environment:
        Variables:
          WAREHOUSE:
            Ref: IcebergWarehouse
          ICEBERG_CATALOG:
            Ref: IcebergCatalog
          ICEBERG_DB:
            Ref: IcebergDb
          ICEBERG_TABLE:
            Ref: IcebergTable
    Metadata:
      DockerContext: /Users/Dilku/app/source-code/tutorai/app/ratescan
      Dockerfile: Dockerfile
      SamResourceId: Stage4UpsertFunction
  RatescanStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: RatescanPipeline
      Type: STANDARD
      DefinitionUri: ../../statemachine/ratescan_pipeline.asl.json
      DefinitionSubstitutions:
        GenerateBankListArn:
          Fn::GetAtt:
          - GenerateBankListFunction
          - Arn
        Stage1Arn:
          Fn::GetAtt:
          - Stage1FetchProductsFunction
          - Arn
        Stage2Arn:
          Fn::GetAtt:
          - Stage2FetchDetailsFunction
          - Arn
        Stage3Arn:
          Fn::GetAtt:
          - Stage3FlattenCsvFunction
          - Arn
        Stage4Arn:
          Fn::GetAtt:
          - Stage4UpsertFunction
          - Arn
        AlertTopicArn:
          Ref: AlertTopic
      Role:
        Fn::GetAtt:
        - StateMachineRole
        - Arn
      Logging:
        Level: ERROR
        IncludeExecutionData: true
        Destinations:
        - CloudWatchLogsLogGroup:
            LogGroupArn:
              Fn::GetAtt:
              - StateMachineLogGroup
              - Arn
  StateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/states/RatescanPipeline
      RetentionInDays: 30
  DailySchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: ratescan-daily
      Description: Trigger Ratescan pipeline at 07:00 AEST daily
      ScheduleExpression: cron(0 7 * * ? *)
      ScheduleExpressionTimezone: Australia/Sydney
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn:
          Fn::GetAtt:
          - RatescanStateMachine
          - Arn
        RoleArn:
          Fn::GetAtt:
          - SchedulerRole
          - Arn
        Input: '{}'
  GenerateBankListRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ratescan-generate-bank-list-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: ReadConfig
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}/config.json
  Stage1Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ratescan-stage1-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: Stage1S3
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}/config.json
          - Effect: Allow
            Action: s3:PutObject
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}/products/*
  Stage2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ratescan-stage2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: Stage2S3
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource:
            - Fn::Sub: arn:aws:s3:::${DataBucketName}/config.json
            - Fn::Sub: arn:aws:s3:::${DataBucketName}/products/*
          - Effect: Allow
            Action: s3:PutObject
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}/products/*
  Stage3Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ratescan-stage3-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: Stage3S3
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: s3:ListBucket
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}
            Condition:
              StringLike:
                s3:prefix:
                - products/*
          - Effect: Allow
            Action: s3:GetObject
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}/products/*
          - Effect: Allow
            Action: s3:PutObject
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}/product-master-*.csv
  Stage4Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ratescan-stage4-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: Stage4S3
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}/product-master-*.csv
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}/iceberg/*
          - Effect: Allow
            Action: s3:ListBucket
            Resource:
              Fn::Sub: arn:aws:s3:::${DataBucketName}
      - PolicyName: Stage4Glue
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - glue:GetDatabase
            - glue:CreateDatabase
            - glue:GetTable
            - glue:CreateTable
            - glue:UpdateTable
            - glue:DeleteTable
            - glue:GetPartitions
            - glue:BatchCreatePartition
            Resource:
            - Fn::Sub: arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
            - Fn::Sub: arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${IcebergDb}
            - Fn::Sub: arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${IcebergDb}/${IcebergTable}
  StateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ratescan-statemachine-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: states.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: InvokeLambdas
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: lambda:InvokeFunction
            Resource:
            - Fn::GetAtt:
              - GenerateBankListFunction
              - Arn
            - Fn::GetAtt:
              - Stage1FetchProductsFunction
              - Arn
            - Fn::GetAtt:
              - Stage2FetchDetailsFunction
              - Arn
            - Fn::GetAtt:
              - Stage3FlattenCsvFunction
              - Arn
            - Fn::GetAtt:
              - Stage4UpsertFunction
              - Arn
          - Effect: Allow
            Action: sns:Publish
            Resource:
              Ref: AlertTopic
      - PolicyName: CloudWatchLogs
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - logs:CreateLogDelivery
            - logs:GetLogDelivery
            - logs:UpdateLogDelivery
            - logs:DeleteLogDelivery
            - logs:ListLogDeliveries
            - logs:PutResourcePolicy
            - logs:DescribeResourcePolicies
            - logs:DescribeLogGroups
            Resource: '*'
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ratescan-scheduler-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: scheduler.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: StartExecution
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: states:StartExecution
            Resource:
              Fn::GetAtt:
              - RatescanStateMachine
              - Arn
Conditions:
  HasAlertEmail:
    Fn::Not:
    - Fn::Equals:
      - Ref: AlertEmail
      - ''
Outputs:
  StateMachineArn:
    Description: Step Functions state machine ARN
    Value:
      Fn::GetAtt:
      - RatescanStateMachine
      - Arn
  AlertTopicArn:
    Description: SNS topic ARN for pipeline failure alerts
    Value:
      Ref: AlertTopic
  ECRRepositoryUri:
    Description: ECR repository URI for the pipeline container image
    Value:
      Fn::Sub: ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/ratescan-pipeline
