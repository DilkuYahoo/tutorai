<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#6366f1"/>

  <!-- Logo mark diamond -->
  <polygon points="72,72 88,56 104,72 88,88" fill="#6366f1"/>

  <!-- RateScan wordmark -->
  <text x="118" y="86" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="36" fill="#6366f1" letter-spacing="-0.5">RateScan</text>

  <!-- Tagline -->
  <text x="72" y="220" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="64" fill="#ffffff" letter-spacing="-1.5">Today's Australian</text>
  <text x="72" y="300" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="64" fill="#818cf8" letter-spacing="-1.5">Mortgage Rates</text>

  <!-- Subtitle -->
  <text x="72" y="368" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#64748b">Live data · 91 lenders · Open Banking CDS</text>

  <!-- Divider -->
  <line x1="72" y1="410" x2="460" y2="410" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Rate chips -->
  <!-- Variable rate chip -->
  <rect x="72" y="432" width="220" height="72" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="92" y="462" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#64748b" letter-spacing="1">VARIABLE P&amp;I</text>
  <text x="92" y="492" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#34d399" letter-spacing="-0.5">6.05<tspan font-size="18" font-weight="400" fill="#64748b">%</tspan></text>

  <!-- Fixed 3Y chip -->
  <rect x="308" y="432" width="220" height="72" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="328" y="462" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#64748b" letter-spacing="1">FIXED 3Y</text>
  <text x="328" y="492" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#f1f5f9" letter-spacing="-0.5">6.39<tspan font-size="18" font-weight="400" fill="#64748b">%</tspan></text>

  <!-- Personal loan chip -->
  <rect x="544" y="432" width="220" height="72" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="564" y="462" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#64748b" letter-spacing="1">PERSONAL LOAN</text>
  <text x="564" y="492" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#f1f5f9" letter-spacing="-0.5">8.46<tspan font-size="18" font-weight="400" fill="#64748b">%</tspan></text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0f172a" opacity="0.8"/>
  <text x="72" y="615" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#475569">ratescan.com.au · Rates updated daily · Not financial advice</text>
</svg>
